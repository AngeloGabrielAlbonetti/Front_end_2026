<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabalhos-front-end</title>

<style>
nav img {
    display: flex;
    border-radius: 30px;
}

nav {
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    text-align: center;
    gap: 20px;
    background-color: #ffffff;
    border-radius: 7px;
    padding: 5px;
}

nav samp {
    display: flex;
    align-items: center;
}

.tr {
    display: flex;
    flex-direction: row;
    gap: 20px;
    padding: 20px;
}

.tr img {
    display: flex;
    padding: 10px;
}

a {
    text-decoration: none;
    color: black;
}

.tr a:hover {
    transform: scale(1.1);
}

body {
    text-align: center;
    background: linear-gradient(to bottom, #00ffff, #ffffff);
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
}
</style>
</head>

<body>

<div class="navegação">
<nav>
<img src="https://angelogabrielalbonetti.github.io/Front_end_2026/tr2/1745601131792.jpg" height="50" width="50">
<samp>
Aluno: Angelo Gabriel Albonetti<br>
RA: 250543483-2
</samp>
</nav>
</div>

<h1>Meus Trabalhos front-end</h1>

<div class="tr" id="trabalhos"></div>

<script>

const usuario = "angelogabrielalbonetti";
const repo = "Front_end_2026";

fetch(`https://api.github.com/repos/${usuario}/${repo}/contents`)
.then(res => res.json())
.then(data => {

const container = document.getElementById("trabalhos");

data.forEach(item => {

if(item.type === "dir" && item.name.startsWith("tr")){

const numero = item.name.replace("tr","");

const link = document.createElement("a");
link.href = `https://${usuario}.github.io/${repo}/${item.name}/`;
link.target = "_blank";

link.innerHTML = `
<img src="https://cdn-icons-png.flaticon.com/512/1157/1157026.png" height="50" width="50">
<p>Trabalho ${numero}</p>
`;

container.appendChild(link);

}

});

});

</script>

</body>
</html>
