<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> CAIXA </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">



    <style>
        .topo {
            background: #ffc107;
            text-align: center;
            font-size: 43px;
            font-weight: bold;
            border: 2px solid #000faf;
        }
        
        .painel {
            background: #aaa;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #000faf;
        }
        
        .total {
            font-size: 32px;
            text-align: right;
            font-weight: bold;
        }
    </style>
</head>



<body class="bg-primary bg-gradient">

    <div class="container mt-3">

        <div class="topo"> caixa livre </div>

        <div class="row mt-3">

            <div class="col-md-7">
                <h3 class=t ext-white "> <span class = "badge text-by-prymari "> sua compra </span> </h3>
				<ul id="lista " class = "list-group lista "> </ul>
			</div>

			<div class = "col-md-5 ">
			
			<div class = "painel ">
			
				Total: <span class = "total "> 0.00</span>
				
			</div>

			<div class = "painel ">
			   <label>codico de barras </label>
		           <input type = "text " id = "cod " class = "form-control ">
			</div>	



			<div class = "painel ">
			   <label>quantidade </label>
		           <input type = "number " id = "qtd " value = "1 " class = "form-control ">
			</div>	

			<div class ="painel ">
			
			sub-total:<span id= "sub "> 0.00</span>			

			</div>				

			<button class ="btn btn-success w-100 " onclick ="addProduto() ">
				Adicionar produto

			</button>

			</div>

	</div>	

</div>
	<script src="js.js "> </script>
</body>



</html>
